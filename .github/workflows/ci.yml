name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest

      - name: Generate coverage badge
        if: matrix.python-version == '3.13'
        run: |
          mkdir -p .github/badges
          uv run --python ${{ matrix.python-version }} coverage json -o /tmp/coverage.json
          python3 - <<'EOF'
          import json

          with open("/tmp/coverage.json") as f:
              percent = json.load(f)["totals"]["percent_covered"]

          if percent >= 90:
              color = "brightgreen"
          elif percent >= 75:
              color = "yellow"
          else:
              color = "red"

          badge = {
              "schemaVersion": 1,
              "label": "coverage",
              "message": f"{percent:.0f}%",
              "color": color,
          }
          with open(".github/badges/coverage.json", "w") as f:
              json.dump(badge, f)
          EOF

      - name: Commit coverage badge
        if: matrix.python-version == '3.13' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- .github/badges/coverage.json; then
            git add .github/badges/coverage.json
            git commit -m "chore: update coverage badge [skip ci]"
            git push
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install dependencies
        run: uv sync

      - name: Ruff format and auto-fix
        run: |
          uv run ruff format .
          uv run ruff check --fix .

      - name: Commit ruff fixes
        # Only push back when we own the branch: direct pushes to main, or
        # PRs opened from branches in this repo (not external forks).
        if: >
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'pull_request' &&
           github.event.pull_request.head.repo.full_name == github.repository)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "style: apply ruff auto-fix [skip ci]"
            git push
          fi

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .
